<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <title>Task Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>Task Manager</h1>

<form method="POST" action="/add">
    <input name="title" placeholder="Nova tarefa" required>
    <button type="submit">Adicionar</button>
</form>

<h2>Tarefas</h2>

<ul>
    {% for task in tasks %}
    <li>
        <span class="task-title">{{ task.title }}</span>

        <div class="task-actions">
            <!-- Botão Editar -->
            <a href="/edit/{{ loop.index0 }}" class="btn-edit" title="Editar tarefa">
                ✏️
            </a>

            <!-- Botão Excluir -->
            <form method="POST" action="/delete/{{ loop.index0 }}"
                  onsubmit="return confirm('Deseja excluir esta tarefa?')">
                <button type="submit" class="btn-delete" title="Excluir tarefa">
                    🗑️
                </button>
            </form>
        </div>
    </li>
    {% endfor %}
</ul>

</body>
</html>
